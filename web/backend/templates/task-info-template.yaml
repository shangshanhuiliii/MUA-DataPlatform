# Task Info Template
# 用于在 dataset 目录下生成 task-info.yaml 文件

# 任务ID
id: $id
# 任务请求
description: $description 
# 实际指令
instruction: $instruction
# 任务难度：
# 2:（菜品、地点） 
# 3：（2+店铺排序方式或优惠券使用方式中的一个限制条件）
# 4：(2+店铺排序方式和优惠使用方式的两个限制)
# 5：（4+关于餐厅类型或者具体餐厅名字的限制）
level: $level
# 标签,用 ; 分隔两个标签. 如：信息充分;客观满足
# 信息充分/信息缺失：是否缺少完成任务的必要信息，比如点外卖没提供要点什么菜
# 客观满足/客观不满足：在实际场景下，不能完成任务。
tags: $tags
# 任务的背景信息：用户姓名，电话，公司，家等角色相关的信息描述
background: >
  $background
